html, body {
  -webkit-user-select: none;
  user-select: none;
  background-color: #2d1b4e;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  display: flex;
  overflow: hidden;
}

#root {
  width: 780px;
  height: 580px;
  overflow: hidden;
}

.glass-light {
  background: rgba(15, 5, 30, 0.549);
  border: 1px solid rgba(255, 255, 255, 0.149);
}

.glass-card {
  background: #1a0d34;
  border: 1px solid rgba(255, 255, 255, 0.149);
}

.logo-glow {
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.502), 0 0 30px rgba(233, 69, 96, 0.302), 0 2px 4px rgba(0, 0, 0, 0.302);
  font-family: Orbitron, sans-serif;
}

@keyframes pulse-glow {
  0%, 100% {
    box-shadow: 0 0 10px rgba(74, 222, 80, 0.4), 0 0 25px rgba(74, 222, 80, 0.2), 0 4px 15px rgba(0, 0, 0, 0.302);
  }

  50% {
    box-shadow: 0 0 20px rgba(74, 222, 80, 0.6), 0 0 45px rgba(74, 222, 80, 0.302), 0 4px 15px rgba(0, 0, 0, 0.302);
  }
}

.btn-glow-pulse {
  animation: 2s ease-in-out infinite pulse-glow;
}

@keyframes shimmer {
  0% {
    background-position: -200% 0;
  }

  100% {
    background-position: 200% 0;
  }
}

.progress-shimmer {
  background-image: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.251) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: 1.5s ease-in-out infinite shimmer;
}

@keyframes stripe-move {
  0% {
    background-position: 0 0;
  }

  100% {
    background-position: 40px 0;
  }
}

.progress-stripes {
  background-image: repeating-linear-gradient(-45deg, transparent, transparent 8px, rgba(255, 255, 255, 0.102) 8px 16px);
  animation: 1s linear infinite stripe-move;
}

::-webkit-scrollbar {
  width: 5px;
}

::-webkit-scrollbar-track {
  background: none;
}

::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.251);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.4);
}

.gap-1 > * { margin-left: 0.25rem; }
.gap-1 > *:first-child { margin-left: 0; }
.gap-2 > * { margin-left: 0.5rem; }
.gap-2 > *:first-child { margin-left: 0; }
.gap-3 > * { margin-left: 0.75rem; }
.gap-3 > *:first-child { margin-left: 0; }
.gap-4 > * { margin-left: 1rem; }
.gap-4 > *:first-child { margin-left: 0; }
/* Column direction: use margin-top instead */
.flex-col > * { margin-left: 0 !important; }
.flex-col.gap-1 > * { margin-top: 0.25rem; }
.flex-col.gap-1 > *:first-child { margin-top: 0; }
.flex-col.gap-2 > * { margin-top: 0.5rem; }
.flex-col.gap-2 > *:first-child { margin-top: 0; }
.flex-col.gap-3 > * { margin-top: 0.75rem; }
.flex-col.gap-3 > *:first-child { margin-top: 0; }
/* IE11: glass fallback (no backdrop-filter, semi-transparent over bg image) */
.glass-light {
    background: rgba(15, 5, 30, 0.55) !important;
    backdrop-filter: none !important;
}
.glass-card {
    background: rgba(15, 5, 30, 0.5) !important;
    backdrop-filter: none !important;
}
/* IE11: preserve margin-left: auto (gap fallback overrides it) */
